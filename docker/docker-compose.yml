version: '3.8'

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: robotframework-postgres
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - robot-network

  mysql-test:
    image: mysql:8.0
    container_name: robotframework-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
      MYSQL_DATABASE: test_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - robot-network

  robot-runner:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: robotframework-runner
    depends_on:
      postgres-test:
        condition: service_healthy
      mysql-test:
        condition: service_healthy
    volumes:
      - ./:/workspace
      - ./reports:/workspace/reports
    environment:
      DB_HOST: postgres-test
      DB_PORT: 5432
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
    networks:
      - robot-network
    command: tail -f /dev/null

volumes:
  postgres_data:
  mysql_data:

networks:
  robot-network:
    driver: bridge
