# Project Configuration File

[project]
name = Robot Framework Automated Testing
description = Keyword-Driven testing strategy with reusable database keywords
version = 1.0.0
author = Test Automation Team
python_requires = >=3.9

[testing]
framework = Robot Framework
main_library = RPA.Database
ui_library = robotframework-browser
api_library = robotframework-requests

[databases]
supported = [PostgreSQL, MySQL, SQLite, MSSQL]
default = PostgreSQL
development_db = test_db
production_db = prod_db

[ci_cd]
providers = [GitHub Actions, GitLab CI, Jenkins]
default_provider = GitHub Actions
pipeline_config = ci-cd/

[reporting]
format = HTML
report_tool = Allure
artifact_path = reports/

[documentation]
sphinx_enabled = false
api_docs_path = docs/
